# Målerportal app-style Lovelace cards
#
# Requirements (install from HACS → Frontend):
# - piitaya/lovelace-mushroom        (chips + hero)
# - RomRider/apexcharts-card         (daily / hourly bar charts)
#
# Paste this whole block as a single Manual card
# (Edit dashboard → Add card → Manual).
#
# Replace these placeholders with your own entity ids:
# - sensor.your_meter_senaste_avlasning          (last reading + summary attributes)
# - sensor.your_meter_vattenmataravlasning       (live meter reading, for the tap action)
# - sensor.your_meter_aktuellt_flode             (current flow chip)
# - sensor.your_meter_misstankt_vattenlacka      (leak-alarm chip — binary_sensor)
# - sensor.your_meter_kallvatten_energi_dashboard (statistics source for the charts)
#
# NOTE: the bar charts read the *_kallvatten_energi_dashboard statistics
# sensor (clean, continuous, full backfill). For heat/electricity meters use
# the matching "(Energy Dashboard)" statistic sensor instead.

type: vertical-stack
cards:
  - type: custom:mushroom-chips-card
    alignment: center
    chips:
      - type: entity
        entity: sensor.your_meter_senaste_avlasning
        icon: mdi:clock-check-outline
        content_info: state
      - type: entity
        entity: sensor.your_meter_aktuellt_flode
        icon: mdi:water-sync
        content_info: state
      - type: entity
        entity: binary_sensor.your_meter_misstankt_vattenlacka
        icon: mdi:water-alert
        content_info: state

  - type: custom:mushroom-template-card
    primary: >-
      {{ state_attr('sensor.your_meter_senaste_avlasning', 'today_liters') |
      int(0) }} L idag
    secondary: >-
      {{ state_attr('sensor.your_meter_senaste_avlasning',
      'today_vs_yesterday_text') or 'Ingen jämförelse ännu' }} · 7 dgr: {{
      state_attr('sensor.your_meter_senaste_avlasning', 'last_7_days_liters') |
      int(0) }} L
    icon: >-
      {% set d = state_attr('sensor.your_meter_senaste_avlasning',
      'today_vs_yesterday_direction') %}
      {{ 'mdi:trending-down' if d == 'down' else 'mdi:trending-up' if d == 'up'
      else 'mdi:trending-neutral' }}
    icon_color: >-
      {% set d = state_attr('sensor.your_meter_senaste_avlasning',
      'today_vs_yesterday_direction') %}
      {{ 'green' if d == 'down' else 'red' if d == 'up' else 'grey' }}
    multiline_secondary: true
    tap_action:
      action: more-info
      entity: sensor.your_meter_vattenmataravlasning

  - type: custom:apexcharts-card
    graph_span: 14d
    span:
      end: day
    header:
      show: true
      title: Förbrukning per dag
      show_states: false
    yaxis:
      - min: 0
        decimals: 0
    series:
      - entity: sensor.your_meter_kallvatten_energi_dashboard
        name: Förbrukning
        type: column
        color: "#1084cf"
        unit: " L"
        float_precision: 0
        statistics:
          type: change
          period: day
        transform: return x * 1000;
        show:
          datalabels: true
    apex_config:
      chart:
        height: 240
      dataLabels:
        enabled: true
      plotOptions:
        bar:
          borderRadius: 6
          columnWidth: 60%

  - type: custom:apexcharts-card
    graph_span: 24h
    span:
      start: day
    header:
      show: true
      title: Förbrukning per timme (idag)
      show_states: false
    yaxis:
      - min: 0
        decimals: 0
    series:
      - entity: sensor.your_meter_kallvatten_energi_dashboard
        name: Förbrukning
        type: column
        color: "#1084cf"
        unit: " L"
        float_precision: 0
        statistics:
          type: change
          period: hour
        transform: return x * 1000;
    apex_config:
      chart:
        height: 220
      plotOptions:
        bar:
          borderRadius: 4
          columnWidth: 70%
